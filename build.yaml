# ZMK Corne - Configuração Padrão
# Documentação: https://zmk.dev/docs/user-setup
#
# Configuração padrão para Corne com nice!nano v2
# Compila firmware para ambas as metades do teclado

include:
# Dongle com display OLED
  - board: nice_nano_v2
    shield: corne_dongle dongle_display
    snippet: common-config studio-rpc-usb-uart
    artifact-name: corne_dongle

# Left Half como Peripheral
  - board: nice_nano_v2
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_left

  # Right Half como Peripheral  
  - board: nice_nano_v2
    shield: corne_right
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_right

 # Reset settings para todas as boards
  - board: nice_nano_v2
    shield: settings_reset
