# ZMK Corne - Configuração Padrão
# Documentação: https://zmk.dev/docs/config
#
# Este arquivo pode ser usado para ativar recursos opcionais.
# Descomente as linhas abaixo para habilitar funcionalidades específicas.

# Ativar sleep profundo para economia de bateria
 CONFIG_ZMK_SLEEP=y

# Tempo de inatividade antes de entrar em sleep (em milissegundos)
 CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Tempo de inatividade antes de entrar em idle (em milissegundos)
 CONFIG_ZMK_IDLE_TIMEOUT=30000

# CONFIG_ZMK_DISPLAY=y
# Ativar display OLED (se disponível)

# Ativar status de bateria no display
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# Ativar status da camada no display
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y

