# ZMK Corne - Manifesto West Padrão
# Documentação: https://zmk.dev/docs/config
#
# Configuração mínima usando apenas o ZMK oficial

manifest:
  defaults:
    remote: zmkfirmware
    revision: v0.3

  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: englmaxi
      url-base: https://github.com/englmaxi

  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-dongle-display
      remote: englmaxi
      revision: v0.3

  self:
    path: config

