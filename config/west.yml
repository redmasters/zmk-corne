# ZMK Corne - Manifesto West Padrão
# Documentação: https://zmk.dev/docs/config
#
# Configuração mínima usando apenas o ZMK oficial

manifest:
  defaults:
    remotes: zmkfirmware
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
  self:
    path: config

