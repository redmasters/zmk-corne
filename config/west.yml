# ZMK Corne - Manifesto West Padrão
# Documentação: https://zmk.dev/docs/config
#
# Configuração mínima usando apenas o ZMK oficial

manifest:

  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: mctechonology17
      url-base: https://github.com/mctechonology17

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    - name: zmk-config
      remote: mctechonology17
      revision: main

  self:
    path: config

